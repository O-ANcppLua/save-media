name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-typescript:
    name: Unit (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @savemedia/core's dist/ is gitignored. The extension imports its
      # .d.ts at typecheck time, so core must be built first.
      - run: pnpm --filter @savemedia/core build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  build-extension:
    name: Build extension (${{ matrix.target }})
    needs: unit-typescript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @savemedia/core build
      - run: pnpm --filter @savemedia/extension build:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: savemedia-${{ matrix.target }}
          path: packages/extension/dist-${{ matrix.target }}/
          if-no-files-found: error

  e2e:
    name: E2E (Playwright ${{ matrix.project }})
    needs: build-extension
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: chromium
          - browser: firefox
            project: firefox-fixtures
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @savemedia/core build
      - run: pnpm --filter @savemedia/extension exec playwright install --with-deps ${{ matrix.browser }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pnpm --filter @savemedia/extension build:chrome
      # Loading the unpacked MV3 extension via --load-extension requires
      # `headless: false`, which on Linux CI needs an X display. xvfb is
      # pre-installed on ubuntu-latest; the -a flag picks a free DISPLAY.
      - run: xvfb-run -a pnpm --filter @savemedia/extension exec playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: packages/extension/playwright-report/
